<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Longevity Diet — Healthy Kitchen Dubai</title>
  
  <style>
/* ============================================================
   CENTA — Colors & Type Tokens
   Longevity meal-plan delivery. Warm, paper-led, editorial.
   ============================================================ */



/* Editorial accent serif — flagged: Google Fonts substitute, no client font supplied */
@import url("https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Roboto+Mono:wght@400;500&display=swap");

:root {
  /* ─── Base palette — ONLY these 4 colors per brand spec ───── */
  /* #FFFFFF white · #E6EACE cream · #0C542F primary · #173328 deep */

  --white:        #FFFFFF;
  --cream:        #E6EACE;
  --primary:      #0C542F;
  --deep:         #173328;

  /* Paper + surfaces — all map to the 4 colors */
  --paper:        #FFFFFF;   /* primary page background */
  --paper-2:      #E6EACE;   /* recessed / banded sections */
  --paper-3:      #E6EACE;   /* hairline backgrounds */
  --surface:      #FFFFFF;   /* raised cards */
  --surface-2:    #FFFFFF;

  --ink:          #173328;   /* primary text */
  --ink-2:        color-mix(in oklab, #173328 80%, #FFFFFF);   /* secondary text */
  --ink-3:        color-mix(in oklab, #173328 60%, #FFFFFF);   /* tertiary, meta */
  --ink-4:        color-mix(in oklab, #173328 40%, #FFFFFF);   /* placeholder, disabled */

  /* Brand — single primary, shades derived */
  --olive-900:    #173328;
  --olive-700:    #0A3E22;
  --olive-600:    #0A4426;
  --olive-500:    #0C542F;   /* brand primary */
  --olive-400:    color-mix(in oklab, #0C542F 60%, #FFFFFF);
  --olive-300:    color-mix(in oklab, #0C542F 35%, #FFFFFF);
  --olive-200:    color-mix(in oklab, #E6EACE 70%, #0C542F 30%);
  --olive-100:    #E6EACE;

  /* Accent — remapped to primary (no terracotta in the brand) */
  --clay-900:     #173328;
  --clay-700:     #173328;
  --clay-600:     #0C542F;
  --clay-500:     #0C542F;
  --clay-400:     color-mix(in oklab, #0C542F 60%, #FFFFFF);
  --clay-300:     color-mix(in oklab, #0C542F 40%, #FFFFFF);
  --clay-200:     color-mix(in oklab, #E6EACE 60%, #0C542F 40%);
  --clay-100:     #E6EACE;

  /* Tertiary tints — collapsed into the palette */
  --butter-500:   #0C542F;
  --butter-300:   color-mix(in oklab, #0C542F 50%, #E6EACE);
  --butter-100:   #E6EACE;
  --sage-500:     color-mix(in oklab, #0C542F 60%, #E6EACE);
  --sage-300:     color-mix(in oklab, #0C542F 30%, #E6EACE);
  --sage-100:     #E6EACE;
  --sea-500:      #173328;
  --sea-300:      color-mix(in oklab, #173328 50%, #E6EACE);
  --sea-100:      #E6EACE;

  /* ─── Semantic colors ─────────────────────────────────────── */
  --bg:           var(--paper);
  --bg-recessed:  var(--paper-2);
  --bg-elevated:  var(--surface);
  --bg-overlay:   color-mix(in oklab, var(--ink) 55%, transparent);

  --fg:           var(--ink);
  --fg-muted:     var(--ink-2);
  --fg-subtle:    var(--ink-3);
  --fg-faint:     var(--ink-4);
  --fg-on-brand:  var(--paper);
  --fg-on-clay:   var(--paper);

  --border:       color-mix(in oklab, var(--ink) 14%, transparent);
  --border-strong:color-mix(in oklab, var(--ink) 28%, transparent);
  --border-soft:  color-mix(in oklab, var(--ink) 7%, transparent);

  --brand:        var(--olive-500);
  --brand-hover:  var(--olive-600);
  --brand-press:  var(--olive-700);
  --brand-soft:   var(--olive-100);

  --accent:       var(--clay-500);
  --accent-hover: var(--clay-600);
  --accent-soft:  var(--clay-100);

  --success:      var(--olive-600);
  --success-soft: var(--olive-100);
  --warning:      var(--butter-500);
  --warning-soft: var(--butter-100);
  --danger:       var(--deep);
  --danger-soft:  var(--cream);
  --info:         var(--sea-500);
  --info-soft:    var(--sea-100);

  /* ─── Type families ───────────────────────────────────────── */
  --font-sans:    "Roboto Condensed", "Arial Narrow", system-ui, sans-serif;
  --font-serif:   "Instrument Serif", "Iowan Old Style", Georgia, serif;
  --font-mono:    "Roboto Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* ─── Type scale (1.250 — major third, tightened) ─────────── */
  --fs-12:  0.75rem;
  --fs-14:  0.875rem;
  --fs-16:  1rem;
  --fs-18:  1.125rem;
  --fs-21:  1.3125rem;
  --fs-24:  1.5rem;
  --fs-30:  1.875rem;
  --fs-38:  2.375rem;
  --fs-48:  3rem;
  --fs-64:  4rem;
  --fs-88:  5.5rem;

  /* Tracking — Roboto Condensed wants slight negative tracking at display sizes */
  --tr-tight: -0.02em;
  --tr-snug:  -0.01em;
  --tr-base:   0em;
  --tr-wide:   0.04em;
  --tr-eyebrow:0.14em;

  --lh-tight: 1.04;
  --lh-snug:  1.18;
  --lh-base:  1.5;
  --lh-loose: 1.65;

  /* Weights — Roboto Condensed variable */
  --fw-regular:  400;
  --fw-medium:   500;
  --fw-semibold: 600;
  --fw-bold:     700;
  --fw-black:    900;

  /* ─── Spacing (4px base) ──────────────────────────────────── */
  --space-0:  0;
  --space-1:  0.25rem;   /* 4 */
  --space-2:  0.5rem;    /* 8 */
  --space-3:  0.75rem;   /* 12 */
  --space-4:  1rem;      /* 16 */
  --space-5:  1.5rem;    /* 24 */
  --space-6:  2rem;      /* 32 */
  --space-7:  3rem;      /* 48 */
  --space-8:  4rem;      /* 64 */
  --space-9:  6rem;      /* 96 */
  --space-10: 8rem;      /* 128 */

  /* ─── Radii ───────────────────────────────────────────────── */
  --r-0:  0;
  --r-2:  2px;
  --r-4:  4px;
  --r-8:  8px;
  --r-12: 12px;
  --r-16: 16px;
  --r-24: 24px;
  --r-pill: 999px;

  /* ─── Shadows — warm, low, layered (not bluish-cold) ──────── */
  --shadow-1: 0 1px 0 0 color-mix(in oklab, var(--ink) 8%, transparent),
              0 1px 2px -1px color-mix(in oklab, var(--ink) 10%, transparent);
  --shadow-2: 0 1px 0 0 color-mix(in oklab, var(--ink) 6%, transparent),
              0 6px 14px -6px color-mix(in oklab, var(--ink) 18%, transparent);
  --shadow-3: 0 2px 0 0 color-mix(in oklab, var(--ink) 5%, transparent),
              0 18px 30px -12px color-mix(in oklab, var(--ink) 22%, transparent);
  --shadow-inset: inset 0 0 0 1px color-mix(in oklab, var(--ink) 6%, transparent);

  /* ─── Motion ──────────────────────────────────────────────── */
  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in:    cubic-bezier(0.55, 0, 1, 0.45);
  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);
  --dur-1: 120ms;
  --dur-2: 200ms;
  --dur-3: 320ms;
  --dur-4: 520ms;
}

/* ============================================================
   Semantic type styles — apply these to elements directly
   ============================================================ */

.t-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--fs-12);
  font-weight: var(--fw-medium);
  letter-spacing: var(--tr-eyebrow);
  text-transform: uppercase;
  color: var(--fg-subtle);
}

.t-display, h1.display {
  font-family: var(--font-sans);
  font-size: clamp(2.75rem, 6vw, var(--fs-88));
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  color: var(--fg);
}

.t-serif-display {
  font-family: var(--font-serif);
  font-size: clamp(2.5rem, 5.5vw, var(--fs-88));
  font-weight: 400;
  font-style: italic;
  line-height: 1.02;
  letter-spacing: -0.015em;
  color: var(--fg);
}

h1, .t-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-48);
  font-weight: var(--fw-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  color: var(--fg);
}

h2, .t-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-38);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-snug);
  color: var(--fg);
}

h3, .t-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-24);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-snug);
  color: var(--fg);
}

h4, .t-h4 {
  font-family: var(--font-sans);
  font-size: var(--fs-18);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--fg);
}

p, .t-body {
  font-family: var(--font-sans);
  font-size: var(--fs-16);
  font-weight: var(--fw-regular);
  line-height: var(--lh-base);
  color: var(--fg-muted);
}

.t-lead {
  font-family: var(--font-sans);
  font-size: var(--fs-21);
  font-weight: var(--fw-regular);
  line-height: 1.4;
  color: var(--fg-muted);
}

small, .t-small {
  font-size: var(--fs-14);
  line-height: var(--lh-base);
  color: var(--fg-subtle);
}

.t-meta {
  font-family: var(--font-sans);
  font-size: var(--fs-12);
  font-weight: var(--fw-medium);
  letter-spacing: 0.02em;
  color: var(--fg-subtle);
}

.t-stat {
  font-family: var(--font-sans);
  font-size: var(--fs-64);
  font-weight: var(--fw-bold);
  font-variant-numeric: tabular-nums;
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--fg);
}

code, .t-code {
  font-family: var(--font-mono);
  font-size: 0.92em;
  background: var(--paper-2);
  padding: 0.1em 0.35em;
  border-radius: var(--r-4);
}

a, .t-link {
  color: var(--brand);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 0.2em;
  transition: color var(--dur-1) var(--ease-out);
}
a:hover, .t-link:hover { color: var(--brand-hover); }

</style>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--fg);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    body {
      /* Reserve space for sticky bar on mobile */
      padding-bottom: 84px;
    }
    @media (min-width: 768px) {
      body { padding-bottom: 0; }
    }

    button { font-family: inherit; cursor: pointer; }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 22px;
    }
    .container.narrow {
      max-width: 820px;
    }
    @media (min-width: 768px) {
      .container { padding: 0 40px; }
    }

    /* ====== Screen 1 — HERO ====== */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }
    @media (min-width: 880px) {
      .hero-grid {
        grid-template-columns: 1.05fr 0.95fr;
        gap: 56px;
        align-items: center;
        min-height: 78vh;
      }
    }
    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding-top: 4px;
      order: 2;
    }
    @media (min-width: 880px) { .hero-copy { order: 0; padding-top: 0; } }

    .hero-photo {
      position: relative;
      order: 1;
    }
    @media (min-width: 880px) { .hero-photo { order: 0; } }

    .hero-photo-tag {
      position: absolute;
      bottom: 24px;
      left: 16px;
      background: var(--surface);
      padding: 14px 18px;
      border-radius: 12px;
      box-shadow: 0 1px 0 0 color-mix(in oklab, var(--ink) 6%, transparent),
                  0 18px 30px -12px color-mix(in oklab, var(--ink) 28%, transparent);
      max-width: 240px;
    }
    @media (min-width: 880px) {
      .hero-photo-tag { left: -28px; bottom: 56px; }
    }

    .hero-price {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      padding: 12px 18px;
      background: var(--surface);
      border-radius: 999px;
      align-self: flex-start;
      box-shadow: inset 0 0 0 1px var(--border);
      white-space: nowrap;
      flex-wrap: nowrap;
    }

    .hide-on-mobile { display: none; }
    @media (min-width: 600px) { .hide-on-mobile { display: inline; } }

    .hero-cta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }
    .hero-cta button { width: 100%; }
    @media (min-width: 880px) {
      .hero-cta button { width: auto; }
    }

    /* ====== Screen 2 — TRUST STRIP ====== */
    .trust-grid {
      list-style: none;
      margin: 0; padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 16px;
    }
    @media (min-width: 880px) {
      .trust-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 0;
      }
    }
    .trust-grid li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--olive-900);
      letter-spacing: 0.005em;
    }
    @media (min-width: 880px) {
      .trust-grid li {
        justify-content: center;
        padding: 0 18px;
      }
      .trust-grid li + li {
        border-left: 1px solid var(--border-soft);
      }
    }
    .trust-grid svg { color: var(--olive-500); }

    /* ====== Screen 5 — EVIDENCE ====== */
    .evidence-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media (min-width: 768px) {
      .evidence-grid {
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
    }
    .specifics-strip {
      margin-top: 56px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      padding: 32px 24px;
      background: var(--olive-100);
      border-radius: 16px;
    }
    @media (min-width: 768px) {
      .specifics-strip {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* ====== Screen 6 — FOOD WALL ====== */
    .dish-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (min-width: 768px) {
      .dish-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }
    }
    .timeline {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    @media (max-width: 540px) {
      .timeline {
        gap: 0;
      }
      .timeline > div { min-width: 86px; }
    }

    /* ====== Screen 7 — PRICING ====== */
    .plan-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 24px;
    }
    @media (min-width: 880px) {
      .plan-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        align-items: stretch;
      }
    }
    .plan-card {
      position: relative;
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 26px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-shadow: 0 1px 0 0 color-mix(in oklab, var(--ink) 6%, transparent),
                  0 6px 14px -6px color-mix(in oklab, var(--ink) 18%, transparent);
    }
    .plan-card.popular {
      background: var(--olive-900);
      color: var(--paper);
      box-shadow: 0 2px 0 0 color-mix(in oklab, var(--ink) 5%, transparent),
                  0 18px 40px -10px color-mix(in oklab, var(--olive-900) 40%, transparent);
    }
    @media (min-width: 880px) {
      .plan-card.popular {
        margin-top: -12px;
        margin-bottom: -12px;
      }
    }
    .plan-badge {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--clay-500);
      color: var(--paper);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .plan-head { display: flex; flex-direction: column; gap: 8px; }
    .plan-duration {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--fg-subtle);
    }
    .plan-card.popular .plan-duration { color: var(--olive-200); }
    .plan-price {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .plan-price .from {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-subtle);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .plan-card.popular .plan-price .from { color: var(--olive-200); }
    .plan-price .amount {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 44px;
      line-height: 1;
      color: var(--olive-900);
      letter-spacing: -0.028em;
      font-variant-numeric: tabular-nums;
    }
    .plan-card.popular .plan-price .amount { color: var(--paper); }
    .plan-price .per {
      font-size: 15px;
      color: var(--fg-muted);
      font-weight: 500;
    }
    .plan-card.popular .plan-price .per { color: var(--olive-200); }
    .plan-total {
      font-size: 13px;
      color: var(--fg-subtle);
      letter-spacing: 0.02em;
    }
    .plan-card.popular .plan-total { color: var(--olive-200); }
    .plan-bullets {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px dashed color-mix(in oklab, var(--ink) 12%, transparent);
      padding-top: 18px;
      flex: 1;
    }
    .plan-card.popular .plan-bullets {
      border-top-color: color-mix(in oklab, var(--paper) 16%, transparent);
    }
    .plan-bullets li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
    }
    .plan-card.popular .plan-bullets li { color: var(--paper); }

    .price-anchor-note {
      margin-top: 48px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      padding: 36px 32px;
      background: #FFFFFF;
      border-radius: 20px;
      border: 1.5px solid var(--olive-500);
      text-align: center;
    }

    /* ====== Screen 8 — WHO IT'S FOR ====== */
    .who-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }
    @media (min-width: 768px) {
      .who-grid {
        grid-template-columns: 1fr 1fr;
        gap: 40px;
      }
    }
    .who-col {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 32px;
      border: 1.5px solid var(--olive-500);
    }
    .who-head { margin-bottom: 20px; }
    .who-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .who-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .who-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink);
    }
    .who-list li svg { margin-top: 3px; }

    /* ====== Sticky bottom bar ====== */
    .sticky-bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 40;
      background: color-mix(in oklab, var(--surface) 96%, transparent);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border-soft);
      transition: transform 320ms var(--ease-out);
      padding-bottom: env(safe-area-inset-bottom);
    }
    @media (min-width: 768px) {
      .sticky-bar { display: none; }
    }
    .sticky-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ====== Modal ====== */
    .modal-scrim {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: color-mix(in oklab, var(--olive-900) 50%, transparent);
      backdrop-filter: blur(4px);
      display: flex;

  return (

      style={{

        alignItems: "center",
        justifyContent: "center",
        gap: 10,
        fontFamily: "var(--font-sans)",

        cursor: "pointer",
        whiteSpace: "nowrap",
        transition: "all 160ms var(--ease-out)",

  useEffect2(() => {
    if (!open) {
      // Reset after close animation
      const t = setTimeout(() => { setStep(0); setF1(null); setF2(null); setDone(false); }, 320);
      return () => clearTimeout(t);
    }
    document.body.style.overflow = open ? "hidden" : "";
    return () => { document.body.style.overflow = ""; };
  }, [open]);

  const opts1 = [
    "More energy and fewer crashes in my day",
    "Long-term health and biological aging",
    "Recovery from a recent biomarker result or health screen",
    "I just want to eat well consistently without thinking about it",

    "Just want to try the food first (5 days)",
    "A couple of weeks to see how it fits (7–14 days)",
    "A full month — I'd rather commit and see real change (28 days)",
    "Not sure yet, want to discuss with someone",

  const canSubmit = f1 && f2;

  const handleSubmit = () => {
    setDone(true);
    // Build WhatsApp link
    const text = `Hi Healthy Kitchen. I'm interested in the Longevity Diet.\nI'm looking for: ${f1}\nThinking about: ${f2}`;
    const url = `https://wa.me/971000000000?text=${encodeURIComponent(text)}`;
    // Note: we don't actually open it — this is a prototype
    console.log("WhatsApp URL:", url);
  };

  return (
    <div
      className="modal-scrim"
      style={{
        opacity: open ? 1 : 0,
        pointerEvents: open ? "auto" : "none",
      }}
      onClick={onClose}
    >
      <div
        className="modal-sheet"
        style={{
          transform: open ? "translateY(0)" : "translateY(32px)",
        }}

      >
        {/* Close */}

          <Icon name="x" size={20} strokeWidth={2} />

        {!done ? (
          <div className="modal-body">
            <div style={{ marginBottom: 8 }}>
              <Eyebrow>Takes 30 seconds</Eyebrow>

              fontFamily: "var(--font-serif)",

              lineHeight: 1.1,

              margin: "0 0 4px 0",
              letterSpacing: "-0.01em",
            }}>A few quick questions, then we'll connect you.</h3>

              <span style={{
                background: step >= 0 ? "var(--olive-500)" : "var(--paper-3)",
              }}></span>
              <span style={{
                background: step >= 1 ? "var(--olive-500)" : "var(--paper-3)",
              }}></span>
            </div>

            {step === 0 && (
              <div>
                <label style={{
                  display: "block",
                  fontFamily: "var(--font-sans)",
                  fontWeight: 600,
                  fontSize: 16,
                  color: "var(--olive-900)",
                  marginBottom: 14,
                }}>What's drawing you to a longevity-focused plan?</label>
                <div className="chip-stack">
                  {opts1.map(o => (
                    <button
                      key={o}
                      onClick={() => { setF1(o); setStep(1); }}
                      className={`chip ${f1 === o ? "selected" : ""}`}
                    >
                      <span style={{
                        width: 20, height: 20, flexShrink: 0,
                        borderRadius: 999,
                        border: `2px solid ${f1 === o ? "var(--olive-500)" : "var(--border-strong)"}`,
                        background: f1 === o ? "var(--olive-500)" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        transition: "all 160ms var(--ease-out)",
                      }}>
                        {f1 === o && <Icon name="check" size={12} color="var(--paper)" strokeWidth={3} />}
                      </span>
                      <span>{o}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {step === 1 && (
              <div>
                <button onClick={() => setStep(0)} style={{
                  background: "none", border: "none", padding: 0, cursor: "pointer",
                  fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--fg-subtle)",
                  display: "inline-flex", alignItems: "center", gap: 4, marginBottom: 12,

                <label style={{
                  display: "block",
                  fontFamily: "var(--font-sans)",
                  fontWeight: 600,
                  fontSize: 16,
                  color: "var(--olive-900)",

/* Longevity Diet — App shell.
   Ties together all sections, manages modal + sticky bar state. */

/* global React */
function App() {
  const { Header, Hero, TrustStrip, Problem, Manifesto, Evidence, FoodWall } = window.LP1;
  const { Pricing, WhoFor, FAQ, FinalCTA, StickyBar, QualModal } = window.LP2;

  const [open, setOpen] = React.useState(false);
  const [showBar, setShowBar] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => {
      // Show sticky bar once user passes ~80% of viewport (i.e. past hero)
      setShowBar(window.scrollY > window.innerHeight * 0.8);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const openModal = () => setOpen(true);
  const closeModal = () => setOpen(false);

  return (
    <>
      <Header openModal={openModal} />
      <Hero openModal={openModal} />
      <TrustStrip />
      <Problem />
      <Manifesto openModal={openModal} />
      <Evidence openModal={openModal} />
      <FoodWall openModal={openModal} />
      <Pricing openModal={openModal} />
      <WhoFor openModal={openModal} />
      <FAQ openModal={openModal} />
      <FinalCTA openModal={openModal} />
      <StickyBar openModal={openModal} visible={showBar} />
      <QualModal open={open} onClose={closeModal} />
    </>
  );
}

window.App = App;

  </script>
